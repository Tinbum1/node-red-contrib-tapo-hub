/**
 * Tapo Sensor Node (T300, Water sensor)
 * Reads status from Tapo sensors via H100 hub
 * Uses tapo-hub config node for shared hub connection
 */

<script type="text/javascript">
    RED.nodes.registerType('tapo-water', {
        category: 'smart home',
        color: '#2ea1e4',
        defaults: {
            name: { value: "" },
            hub: { type: "tapo-hub", required: true },
            deviceId: { value: "", required: true }
        },
        inputs: 1,
        outputs: 1,
        icon: "sensor.svg",
        label: function() {
            return this.name || "Tapo Water Sensor T300";
        }
    });
</script>

<script type="text/html" data-template-name="tapo-water">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-hub"><i class="fa fa-globe"></i> Tapo Hub</label>
        <input type="text" id="node-input-hub">
    </div>
    <div class="form-row">
        <label for="node-input-deviceId"><i class="fa fa-id-badge"></i> Device ID</label>
        <input type="text" id="node-input-deviceId" placeholder="e.g. 8022XXXXXXXXXXXX">
    </div>
</script>

<script type="text/html" data-help-name="tapo-water">
    <p>Reads the status of a TP-Link Tapo T300 Smart Water Leak Sensor via an H100 Hub.</p>
    
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">any</span></dt>
        <dd>Any input message triggers a real-time status check of the water sensor.</dd>
    </dl>

    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>
            Contains:
            <ul>
                <li><code>waterLeak</code>: Boolean (true if a leak is detected)</li>
                <li><code>status</code>: String ('normal' or 'leak')</li>
                <li><code>battery</code>: Integer percentage</li>
            </ul>
        </dd>
    </dl>
