/**
 * Tapo Sensor Node (T110,Contact)
 * Reads open closed from Tapo sensors via H100 hub
 * Uses tapo-hub config node for shared hub connection
 */

<script type="text/javascript">
    RED.nodes.registerType('tapo-contact', {
        category: 'smart home',
        color: '#2ea1e4',
        defaults: {
            name: { value: "" },
            hub: { type: "tapo-hub", required: true },
            deviceId: { value: "", required: true }
        },
        inputs: 1,
        outputs: 1,
        icon: "sensor.svg",
        label: function() {
            return this.name || "Tapo Contact Sensor";
        }
    });
</script>

<script type="text/html" data-template-name="tapo-contact">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-hub"><i class="fa fa-server"></i> Hub</label>
        <input type="text" id="node-input-hub">
    </div>
    <div class="form-row">
        <label for="node-input-deviceId"><i class="fa fa-id-badge"></i> Device ID</label>
        <input type="text" id="node-input-deviceId" placeholder="Paste Device ID here">
    </div>
</script>

<script type="text/html" data-help-name="tapo-contact">
    <p>Reads the state of a TP-Link Tapo T110 Contact Sensor.</p>
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">string</span></dt>
        <dd>Set to <code>"read"</code> or <code>"status"</code> to fetch the current contact status. Set to <code>"discover"</code> to look for devices.</dd>
    </dl>
    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>Returns an object containing <code>open</code> (boolean state), battery, and signal status.</dd>
    </dl>
</script>
